name: ValueQuant CI

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
      - sprint-1-stabilization
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: valuequant-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-tests:
    name: Smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Compile critical files
        run: |
          python -m py_compile \
            app.py \
            modulos/config.py \
            modulos/scoring_engine.py \
            modulos/tool_catalog.py \
            modulos/tool_router.py \
            modulos/research_core.py \
            modulos/opportunity_briefing.py \
            modulos/automation_center.py \
            modulos/healthcheck.py \
            modulos/smoke_tests.py \
            scripts/run_healthcheck.py \
            scripts/run_smoke_tests.py

      - name: Run healthcheck
        run: |
          python scripts/run_healthcheck.py --ci

      - name: Run smoke tests
        run: |
          python scripts/run_smoke_tests.py --strict
